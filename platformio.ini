; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t-display]
platform = espressif32
board = lilygo-t-display
framework = arduino
monitor_speed = 115200
lib_deps = 
    adafruit/Adafruit NeoPixel@^1.15.2

; ✅ Tối ưu WiFi performance
build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DCONFIG_LWIP_MAX_SOCKETS=16
    -DCONFIG_TCP_OVERSIZE_MSS
    -DCONFIG_LWIP_SO_REUSE=1
    -DBOARD_HAS_PSRAM
    ; ⚠️ Fix GPIO 12 boot issue - set VDD_SDIO to 3.3V
    -DCONFIG_BOOTLOADER_VDDSDIO_BOOST_1_9V=n

; ✅ Upload settings - avoid GPIO 12 conflicts during flash
upload_speed = 921600
upload_resetmethod = nodemcu
monitor_rts = 0
monitor_dtr = 0
